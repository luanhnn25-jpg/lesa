<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b3d91" />
  <title>Confirmar acesso • EstudaViva</title>

  <style>
    :root{
      --blue:#0b3d91;
      --blue2:#08265c;
      --paper:rgba(255,255,255,.12);
      --line:rgba(255,255,255,.18);
      --text:#fff;
      --muted:rgba(255,255,255,.86);
      --ok:#dcfce7;
      --warn:#fffbeb;
      --bad:#fee2e2;
      --shadow:0 24px 70px rgba(2,6,23,.24);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 10% 0%, rgba(255,255,255,.16), transparent 62%),
        radial-gradient(760px 460px at 95% 12%, rgba(34,197,94,.16), transparent 58%),
        linear-gradient(180deg,var(--blue),var(--blue2));
    }

    .card{
      width:min(560px,100%);
      padding:24px;
      border-radius:24px;
      background:var(--paper);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .logo{
      width:46px;
      height:46px;
      border-radius:15px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.20);
      font-weight:1000;
    }

    h1{margin:0;font-size:23px}
    .subtitle{margin:4px 0 0;color:var(--muted);font-size:13px;line-height:1.5}

    .status{
      margin-top:16px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      color:var(--muted);
      line-height:1.6;
      white-space:pre-wrap;
      font-size:14px;
    }

    .status.ok{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.28);color:var(--ok)}
    .status.warn{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.28);color:var(--warn)}
    .status.bad{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.28);color:var(--bad)}

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button,
    .btn{
      appearance:none;
      border:none;
      text-decoration:none;
      cursor:pointer;
      flex:1 1 220px;
      border-radius:15px;
      padding:13px 14px;
      font-weight:950;
      font-size:14px;
      text-align:center;
    }

    .primary{background:#2563eb;color:#fff}
    .ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)}

    .resetCard{
      display:none;
      margin-top:16px;
      padding:16px;
      border-radius:16px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
    }

    .resetCard.open{display:block}

    .resetHint{
      margin:0 0 13px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    label{
      display:block;
      margin:12px 0 7px;
      color:#fff;
      font-size:12px;
      font-weight:950;
    }

    input{
      width:100%;
      min-height:48px;
      border:none;
      outline:none;
      border-radius:14px;
      padding:0 14px;
      font:inherit;
      color:#0f172a;
      background:rgba(255,255,255,.96);
    }

    .spinner{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      display:inline-block;
      vertical-align:-3px;
      margin-right:8px;
      animation:spin .8s linear infinite;
    }

    .footer{
      margin-top:14px;
      text-align:center;
      color:rgba(255,255,255,.76);
      font-size:12px;
    }

    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card" aria-label="Confirmação de acesso">
    <div class="brand">
      <div class="logo">EV</div>
      <div>
        <h1>Confirmar acesso</h1>
        <p class="subtitle">Finalização de login, confirmação de e-mail ou recuperação de senha.</p>
      </div>
    </div>

    <div id="status" class="status warn">
      <span class="spinner"></span>Aguarde enquanto validamos o link...
    </div>

    <section id="resetCard" class="resetCard" aria-label="Redefinir senha">
      <p class="resetHint">Link de recuperação reconhecido. Defina uma nova senha para concluir o processo.</p>
      <label for="newPassword">Nova senha</label>
      <input id="newPassword" type="password" minlength="6" placeholder="Mínimo de 6 caracteres" autocomplete="new-password" />
      <label for="confirmPassword">Confirmar nova senha</label>
      <input id="confirmPassword" type="password" minlength="6" placeholder="Repita a nova senha" autocomplete="new-password" />
      <div class="actions">
        <button id="btnResetPassword" class="primary" type="button">Salvar nova senha</button>
      </div>
    </section>

    <div class="actions">
      <a id="btnLogin" class="btn ghost" href="#">Ir para o login</a>
      <a id="btnHome" class="btn primary" href="#">Ir para o início</a>
    </div>

    <div class="footer">© 2026 • Projeto Integrador</div>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://owpswekkfaleauwjmahc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_I58BBfTZcWtPEIIDSuN5MA_sV8jfPfq";
    const AUTH_STORAGE_KEY = "lpp-guard-pro-auth";
    const SITE_BASE = new URL("./", window.location.href).href;

    const LOGIN_URL = new URL("login.html", SITE_BASE).href;
    const HOME_URL = new URL("index.html", SITE_BASE).href;

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        storageKey: AUTH_STORAGE_KEY
      }
    });

    const statusBox = document.getElementById("status");
    const btnLogin = document.getElementById("btnLogin");
    const btnHome = document.getElementById("btnHome");
    const resetCard = document.getElementById("resetCard");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const btnResetPassword = document.getElementById("btnResetPassword");

    btnLogin.href = LOGIN_URL + "?mode=login";
    btnHome.href = HOME_URL;

    function setStatus(text, type = "warn") {
      statusBox.className = `status ${type}`;
      statusBox.textContent = text;
    }

    function cleanUrl() {
      window.history.replaceState({}, document.title, window.location.origin + window.location.pathname);
    }

    function getAuthParams() {
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const queryParams = new URLSearchParams(window.location.search);
      return {
        type: hashParams.get("type") || queryParams.get("type") || "",
        accessToken: hashParams.get("access_token") || queryParams.get("access_token") || "",
        refreshToken: hashParams.get("refresh_token") || queryParams.get("refresh_token") || "",
        code: queryParams.get("code") || ""
      };
    }

    async function persistRecoverySession(authParams) {
      if (authParams.accessToken && authParams.refreshToken) {
        const { error } = await supabase.auth.setSession({
          access_token: authParams.accessToken,
          refresh_token: authParams.refreshToken
        });
        if (error) throw error;
        return;
      }

      if (authParams.code) {
        const { error } = await supabase.auth.exchangeCodeForSession(authParams.code);
        if (error) throw error;
      }
    }

    async function handlePasswordReset() {
      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (newPassword.length < 6) {
        setStatus("A nova senha deve ter pelo menos 6 caracteres.", "bad");
        return;
      }

      if (newPassword !== confirmPassword) {
        setStatus("A confirmação precisa ser igual à nova senha.", "bad");
        return;
      }

      btnResetPassword.disabled = true;
      setStatus("Salvando sua nova senha...", "warn");

      try {
        const { error } = await supabase.auth.updateUser({ password: newPassword });
        if (error) throw error;
        resetCard.classList.remove("open");
        cleanUrl();
        setStatus("Senha redefinida com sucesso. Redirecionando para o login...", "ok");
        setTimeout(() => window.location.replace(LOGIN_URL + "?mode=login"), 1200);
      } catch (error) {
        setStatus("Não foi possível redefinir a senha.\nErro técnico: " + String(error?.message || error), "bad");
      } finally {
        btnResetPassword.disabled = false;
      }
    }

    async function resolveSession() {
      try {
        const authParams = getAuthParams();

        if (authParams.type === "recovery" || authParams.accessToken || authParams.code) {
          setStatus("Link recebido. Preparando a redefinição de senha...", "warn");
          await persistRecoverySession(authParams);
          resetCard.classList.add("open");
          setStatus("Defina sua nova senha para concluir a recuperação.", "warn");
          return;
        }

        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        if (data?.session?.user) {
          cleanUrl();
          setStatus("Confirmação concluída. Redirecionando...", "ok");
          setTimeout(() => window.location.replace(HOME_URL), 900);
          return;
        }

        setStatus("Nenhuma sessão ativa foi encontrada. Volte para o login e tente novamente.", "bad");
      } catch (error) {
        setStatus(
          "Não foi possível concluir automaticamente.\nPossíveis causas: link expirado, URL não autorizada no Supabase ou instabilidade temporária.\nErro técnico: " + String(error?.message || error),
          "bad"
        );
      }
    }

    btnResetPassword.addEventListener("click", handlePasswordReset);
    resolveSession();
  </script>
</body>
</html>
