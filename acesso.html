<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=login.html" />
  <title>Redirecionando para o acesso</title>
  <script>
    (function () {
      const target = new URL("login.html", window.location.href);
      const current = new URL(window.location.href);
      current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
      current.hash && (target.hash = current.hash);
      window.location.replace(target.href);
    })();
  </script>
</head>
<body>
  <p>Redirecionando para <a href="login.html">login.html</a>...</p>
</body>
</html>
