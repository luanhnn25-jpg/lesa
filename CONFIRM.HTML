<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#0b3d91"/>
  <title>Confirmando acesso • LPP</title>

  <style>
    :root{
      --bg1:#0b3d91;
      --bg2:#08265c;
      --card:rgba(255,255,255,.12);
      --card-border:rgba(255,255,255,.18);
      --text:#ffffff;
      --muted:rgba(255,255,255,.88);
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow:0 24px 60px rgba(2,6,23,.24);
      --radius:20px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 600px at 15% 10%, rgba(255,255,255,.15), transparent 60%),
        radial-gradient(800px 500px at 85% 15%, rgba(255,255,255,.10), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display:grid;
      place-items:center;
      padding:16px;
    }

    .card{
      width:min(560px, 100%);
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:var(--radius);
      padding:22px 18px;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .logo{
      width:46px;
      height:46px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.20);
      font-weight:900;
      letter-spacing:.5px;
    }

    h1{
      margin:0;
      font-size:22px;
      font-weight:1000;
      letter-spacing:.2px;
    }

    .subtitle{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .status{
      margin-top:16px;
      border-radius:16px;
      padding:14px 14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.10);
      color:var(--muted);
      line-height:1.6;
      white-space:pre-wrap;
      font-size:14px;
    }

    .status.ok{
      border-color:rgba(34,197,94,.28);
      background:rgba(34,197,94,.12);
      color:#ecfdf5;
    }

    .status.warn{
      border-color:rgba(245,158,11,.28);
      background:rgba(245,158,11,.12);
      color:#fffbeb;
    }

    .status.bad{
      border-color:rgba(239,68,68,.28);
      background:rgba(239,68,68,.12);
      color:#fef2f2;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button, a.btn{
      appearance:none;
      border:none;
      text-decoration:none;
      cursor:pointer;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      font-size:14px;
      transition:transform .06s ease, filter .15s ease;
    }

    button:hover, a.btn:hover{filter:brightness(1.03)}
    button:active, a.btn:active{transform:translateY(1px)}

    .btnPrimary{
      background:linear-gradient(180deg,#2563eb,#1d4ed8);
      color:#fff;
      flex:1 1 220px;
    }

    .btnGhost{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
      flex:1 1 220px;
    }

    .footer{
      margin-top:14px;
      font-size:12px;
      color:rgba(255,255,255,.82);
      text-align:center;
    }

    .spinner{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      display:inline-block;
      vertical-align:-3px;
      margin-right:8px;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Confirmação de acesso">
    <div class="brand">
      <div class="logo">LPP</div>
      <div>
        <h1>Confirmando acesso</h1>
        <p class="subtitle">Estamos finalizando seu login ou confirmação de e-mail.</p>
      </div>
    </div>

    <div id="status" class="status warn">
      <span class="spinner"></span>Aguarde enquanto validamos sua sessão...
    </div>

    <div class="actions">
      <a id="btnLogin" class="btn btnGhost" href="#">Ir para o login</a>
      <a id="btnHome" class="btn btnPrimary" href="#">Ir para o início</a>
    </div>

    <div class="footer">© 2026 • Projeto Integrador</div>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://owpswekkfaleauwjmahc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_I58BBfTZcWtPEIIDSuN5MA_sV8jfPfq";
    const SITE_BASE = "https://luanhnn25-jpg.github.io/lesa/";

    const LOGIN_URL = new URL("login.html", SITE_BASE).href;
    const HOME_URL = new URL("index.html", SITE_BASE).href;

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const statusBox = document.getElementById("status");
    const btnLogin = document.getElementById("btnLogin");
    const btnHome = document.getElementById("btnHome");

    btnLogin.href = LOGIN_URL;
    btnHome.href = HOME_URL;

    function getGoUrl() {
      const go = localStorage.getItem("lpp_go_after_auth") || "index.html";
      if (/^https?:\/\//i.test(go)) return go;
      return new URL(go.replace(/^\/+/, ""), SITE_BASE).href;
    }

    function setStatus(text, type = "warn") {
      statusBox.className = `status ${type}`;
      statusBox.textContent = text;
    }

    function cleanUrl() {
      const clean = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, clean);
    }

    async function resolveSession() {
      try {
        setStatus("Validando retorno do e-mail e atualizando sua sessão...", "warn");

        // detectSessionInUrl:true já ajuda o Supabase a processar tokens/hash na URL
        // Depois disso, tentamos ler a sessão efetiva:
        const { data, error } = await supabase.auth.getSession();

        if (error) {
          throw error;
        }

        const session = data?.session;

        if (session?.user) {
          cleanUrl();
          setStatus("Confirmação concluída com sucesso. Redirecionando...", "ok");
          setTimeout(() => {
            window.location.replace(getGoUrl());
          }, 900);
          return;
        }

        // fallback: tenta recuperar usuário atual
        const { data: userData, error: userError } = await supabase.auth.getUser();

        if (userError) {
          throw userError;
        }

        if (userData?.user) {
          cleanUrl();
          setStatus("Sessão confirmada. Redirecionando...", "ok");
          setTimeout(() => {
            window.location.replace(getGoUrl());
          }, 900);
          return;
        }

        setStatus(
          "Não foi possível localizar uma sessão ativa após a confirmação.\n\n" +
          "Volte para a tela de login e tente entrar novamente.",
          "bad"
        );

        setTimeout(() => {
          window.location.replace(LOGIN_URL);
        }, 2200);

      } catch (e) {
        setStatus(
          "Não foi possível concluir a confirmação automaticamente.\n\n" +
          "Possíveis causas:\n" +
          "• link expirado\n" +
          "• URL de redirecionamento não autorizada no Supabase\n" +
          "• projeto Supabase indisponível\n\n" +
          "Erro técnico: " + String(e?.message || e),
          "bad"
        );

        setTimeout(() => {
          window.location.replace(LOGIN_URL);
        }, 2800);
      }
    }

    resolveSession();
  </script>
</body>
</html>
